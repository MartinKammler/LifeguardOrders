<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><title>Tests – sync</title></head>
<body><pre id="out"></pre>
<script type="module">
import {
  getSyncState,
  getScopeSyncStatus,
  hasPendingSync,
  isConflictSync,
  isWriteBlockedSync,
  markSyncSuccess,
  persistJsonWithSync,
  hydrateJsonFromSync,
  syncHinweisText,
} from '../src/sync.js';

let ok = 0, fail = 0;
function assert(label, cond) {
  document.getElementById('out').textContent += (cond ? '✅' : '❌') + ' ' + label + '\n';
  cond ? ok++ : fail++;
}

function mockStorage() {
  const store = {};
  return {
    load: key => (Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null),
    save: (key, val) => { store[key] = val; },
  };
}

// ── Grundfunktionen ─────────────────────────────────────────────────
document.getElementById('out').textContent += '── Grundfunktionen ──\n';

assert('getSyncState: leerer Storage → {}', typeof getSyncState(mockStorage()) === 'object');
assert('getScopeSyncStatus: unbekannter Scope → null', getScopeSyncStatus({}, 'x') === null);
assert('hasPendingSync: immer false', hasPendingSync({}, 'x') === false);
assert('isConflictSync: kein Eintrag → false', isConflictSync({}, 'x') === false);
assert('isWriteBlockedSync: null → false', isWriteBlockedSync(null) === false);
assert('isWriteBlockedSync: synced → false', isWriteBlockedSync({ mode: 'synced' }) === false);
assert('isWriteBlockedSync: conflict → true', isWriteBlockedSync({ mode: 'conflict' }) === true);
assert('isWriteBlockedSync: offline-readonly → true', isWriteBlockedSync({ mode: 'offline-readonly' }) === true);
assert('isWriteBlockedSync: auth-required → true', isWriteBlockedSync({ mode: 'auth-required' }) === true);

// ── markSyncSuccess ─────────────────────────────────────────────────
document.getElementById('out').textContent += '\n── markSyncSuccess ──\n';
const stateErfolg = markSyncSuccess({}, 'bestellungen', '/pfad', { etag: 'e-abc' });
const statusErfolg = getScopeSyncStatus(stateErfolg, 'bestellungen');
assert('markSyncSuccess: mode === synced', statusErfolg?.mode === 'synced');
assert('markSyncSuccess: writable === true', statusErfolg?.writable === true);
assert('markSyncSuccess: etag gespeichert', statusErfolg?.etag === 'e-abc');
assert('markSyncSuccess: andere Scopes unberührt', getScopeSyncStatus(stateErfolg, 'rechnungen') === null);

// ── syncHinweisText ─────────────────────────────────────────────────
document.getElementById('out').textContent += '\n── syncHinweisText ──\n';
assert('syncHinweisText: null → leerer String', syncHinweisText(null) === '');
assert('syncHinweisText: synced enthält synchronisiert', syncHinweisText({ mode: 'synced' }, 'Daten').includes('synchronisiert'));
assert('syncHinweisText: auth-required enthält Nextcloud', syncHinweisText({ mode: 'auth-required' }, 'Daten').includes('Nextcloud'));
assert('syncHinweisText: offline-readonly enthält geladen', syncHinweisText({ mode: 'offline-readonly' }, 'Daten').includes('geladen'));
assert('syncHinweisText: conflict enthält remote', syncHinweisText({ mode: 'conflict' }, 'Daten').includes('remote'));

// ── persistJsonWithSync: kein Client ────────────────────────────────
document.getElementById('out').textContent += '\n── persistJsonWithSync ──\n';

const s1 = mockStorage();
const r1 = await persistJsonWithSync({ scope: 'test', data: [], client: null, remotePath: '/p', storage: s1 });
assert('kein Client: ok === false', r1.ok === false);
assert('kein Client: mode === auth-required', r1.sync?.mode === 'auth-required');

// frische 404 (Datei noch nicht vorhanden → erster Schreibvorgang)
const s2 = mockStorage();
const clientFrisch = {
  head: async () => ({ ok: false, missing: true }),
  writeJson: async () => ({ ok: true, etag: 'etag-neu' }),
};
const r2 = await persistJsonWithSync({ scope: 'test', data: [1], client: clientFrisch, remotePath: '/p', storage: s2 });
assert('frische 404: ok === true', r2.ok === true);
assert('frische 404: mode === synced', r2.sync?.mode === 'synced');

// ETag-Match (normale Aktualisierung)
const s3 = mockStorage();
s3.save('lo_sync_status', markSyncSuccess({}, 'test', '/p', { etag: 'v1' }));
const clientMatch = {
  head: async () => ({ ok: true, etag: 'v1', missing: false }),
  writeJson: async () => ({ ok: true, etag: 'v2' }),
};
const r3 = await persistJsonWithSync({ scope: 'test', data: [2], client: clientMatch, remotePath: '/p', storage: s3 });
assert('ETag-Match: ok === true', r3.ok === true);
assert('ETag-Match: mode === synced', r3.sync?.mode === 'synced');

// ETag-Wechsel vor dem Upload blockiert nicht mehr pauschal
const s4 = mockStorage();
s4.save('lo_sync_status', markSyncSuccess({}, 'test', '/p', { etag: 'v1' }));
let konfliktWriteEtag = '';
const clientKonflikt = {
  head: async () => ({ ok: true, etag: 'v2-remote', missing: false }),
  writeJson: async (path, data, opts = {}) => {
    konfliktWriteEtag = opts.ifMatch || '';
    return { ok: true, etag: 'v3-remote' };
  },
};
const r4 = await persistJsonWithSync({ scope: 'test', data: [3], client: clientKonflikt, remotePath: '/p', storage: s4 });
assert('ETag-Wechsel: ok === true', r4.ok === true);
assert('ETag-Wechsel: schreibt gegen aktuellen Remote-ETag', konfliktWriteEtag === 'v2-remote');
assert('ETag-Wechsel: Sync bleibt synced', r4.sync?.mode === 'synced');

// echter Konflikt nur noch wenn zwischen HEAD und PUT ein 412 auftritt
const s4b = mockStorage();
s4b.save('lo_sync_status', markSyncSuccess({}, 'test', '/p', { etag: 'v1' }));
const r4b = await persistJsonWithSync({
  scope: 'test',
  data: [4],
  client: {
    head: async () => ({ ok: true, etag: 'v2-remote', missing: false }),
    writeJson: async () => ({ ok: false, conflict: true, error: '412 Precondition Failed' }),
  },
  remotePath: '/p',
  storage: s4b,
});
assert('412-Konflikt: ok === false', r4b.ok === false);
assert('412-Konflikt: mode === conflict', r4b.sync?.mode === 'conflict');
assert('412-Konflikt: isConflictSync erkannt', isConflictSync(s4b.load('lo_sync_status'), 'test') === true);
assert('412-Konflikt: isWriteBlockedSync auf gespeichertem Status', isWriteBlockedSync(s4b.load('lo_sync_status')?.test) === true);

// Netzwerkfehler beim HEAD
const s5 = mockStorage();
const clientOffline = {
  head: async () => ({ ok: false, missing: false, error: 'Verbindung abgelehnt' }),
};
const r5 = await persistJsonWithSync({ scope: 'test', data: [], client: clientOffline, remotePath: '/p', storage: s5 });
assert('Netzwerkfehler: ok === false', r5.ok === false);
assert('Netzwerkfehler: mode === offline-readonly', r5.sync?.mode === 'offline-readonly');

// writeJson schlägt fehl (412 Precondition Failed → conflict)
const s6 = mockStorage();
const clientPrecondition = {
  head: async () => ({ ok: false, missing: true }),
  writeJson: async () => ({ ok: false, conflict: true, error: '412 Precondition Failed' }),
};
const r6 = await persistJsonWithSync({ scope: 'test', data: [], client: clientPrecondition, remotePath: '/p', storage: s6 });
assert('412 Precondition: ok === false', r6.ok === false);
assert('412 Precondition: mode === conflict', r6.sync?.mode === 'conflict');

// ── hydrateJsonFromSync ─────────────────────────────────────────────
document.getElementById('out').textContent += '\n── hydrateJsonFromSync ──\n';

// kein Client → kein lokaler Fallback
const s7 = mockStorage();
const h1 = await hydrateJsonFromSync({ scope: 'test', client: null, remotePath: '/p', storage: s7, defaultData: [] });
assert('hydrate kein Client: source === auth-required', h1.source === 'auth-required');
assert('hydrate kein Client: leere Daten zurück', Array.isArray(h1.data) && h1.data.length === 0);
assert('hydrate kein Client: mode === auth-required', h1.sync?.mode === 'auth-required');

// gültiger Remote → Remote-Daten
const s8 = mockStorage();
s8.save('lo_data', [{ id: 'alt' }]);
const clientRemote = {
  readJson: async () => ({ ok: true, data: [{ id: 'remote' }], etag: 'e1' }),
};
const h2 = await hydrateJsonFromSync({ scope: 'test', client: clientRemote, remotePath: '/p', isValidRemote: d => Array.isArray(d), storage: s8 });
assert('hydrate Remote: source === remote', h2.source === 'remote');
assert('hydrate Remote: Remote-Daten zurück', h2.data?.[0]?.id === 'remote');
assert('hydrate Remote: mode === synced', h2.sync?.mode === 'synced');

// Remote-Fehler → kein lokaler Fallback
const s9 = mockStorage();
const clientFehler = {
  readJson: async () => ({ ok: false, error: 'Netzwerk' }),
};
const h3 = await hydrateJsonFromSync({ scope: 'test', client: clientFehler, remotePath: '/p', storage: s9, defaultData: [] });
assert('hydrate Fallback: source === remote-required', h3.source === 'remote-required');
assert('hydrate Fallback: leere Daten zurück', Array.isArray(h3.data) && h3.data.length === 0);
assert('hydrate Fallback: mode === offline-readonly', h3.sync?.mode === 'offline-readonly');

// isValidRemote schlägt fehl → kein lokaler Fallback
const s10 = mockStorage();
const clientInvalid = {
  readJson: async () => ({ ok: true, data: 'kein-array', etag: 'e2' }),
};
const h4 = await hydrateJsonFromSync({ scope: 'test', client: clientInvalid, remotePath: '/p', isValidRemote: d => Array.isArray(d), storage: s10, defaultData: [] });
assert('hydrate invalid Remote: source === remote-required', h4.source === 'remote-required');
assert('hydrate invalid Remote: leere Daten zurück', Array.isArray(h4.data) && h4.data.length === 0);

document.getElementById('out').textContent += `\n${ok}/${ok + fail} Tests bestanden — ${fail} fehlgeschlagen`;
</script></body></html>
