<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mitglieder-Parser – Unit Tests</title>
  <style>
    body { font-family: monospace; background: #0d0d12; color: #ccc; margin: 0; padding: 20px; }
    h1   { color: #fff; font-size: 1.1rem; margin-bottom: 16px; }
    .suite { margin-bottom: 20px; }
    .suite-title { color: #7eb8f7; font-size: .9rem; margin-bottom: 6px; font-weight: bold; }
    .pass { color: #4caf7d; }
    .fail { color: #f76e6e; }
    .result { font-size: .82rem; margin: 2px 0 2px 12px; }
    #summary { margin-top: 24px; font-size: 1rem; font-weight: bold; padding: 10px; border-radius: 6px; }
    .all-pass { background: #1a3a28; color: #4caf7d; }
    .has-fail  { background: #3a1a1a; color: #f76e6e; }
  </style>
</head>
<body>
<h1>Mitglieder-Parser – Unit Tests</h1>
<div id="output"></div>
<div id="summary"></div>

<script type="module">
import { parseMitglieder } from '../src/mitglieder.js';

const results = [];
let currentSuite = '';
function suite(name) { currentSuite = name; }
async function test(name, fn) {
  try { await fn(); results.push({ suite: currentSuite, name, ok: true }); }
  catch (e) { results.push({ suite: currentSuite, name, ok: false, err: e.message }); }
}
function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'Assertion fehlgeschlagen'); }
function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg||'') + ` — erwartet: ${JSON.stringify(b)}, bekommen: ${JSON.stringify(a)}`); }

/* ── Testdaten ──────────────────────────────────────────────── */

const TEXT_ZWEI = `
  { id: 'martin_kammler', name: 'Martin Kammler', pin: '291305', mustChangePIN: false },
  { id: 'dorit_storzum', name: 'Dorit Storzum', pin: '928364', mustChangePIN: true },
`;

const TEXT_UMLAUTE = `
  { id: 'amelie_pfueller', name: 'Amelie Pfüller', pin: '492736', mustChangePIN: true },
`;

const TEXT_LEER = '';
const TEXT_KEIN_MATCH = 'das ist kein gültiger Eintrag';

/* ── Tests ──────────────────────────────────────────────────── */

suite('parseMitglieder — Normalfall');

await test('extrahiert id korrekt', () => {
  const { mitglieder } = parseMitglieder(TEXT_ZWEI);
  assertEqual(mitglieder[0].id, 'martin_kammler');
  assertEqual(mitglieder[1].id, 'dorit_storzum');
});

await test('extrahiert name korrekt', () => {
  const { mitglieder } = parseMitglieder(TEXT_ZWEI);
  assertEqual(mitglieder[0].name, 'Martin Kammler');
  assertEqual(mitglieder[1].name, 'Dorit Storzum');
});

await test('liefert genau 2 Einträge', () => {
  const { mitglieder } = parseMitglieder(TEXT_ZWEI);
  assertEqual(mitglieder.length, 2);
});

await test('enthält keine pin-Felder', () => {
  const { mitglieder } = parseMitglieder(TEXT_ZWEI);
  assert(!('pin' in mitglieder[0]), 'pin darf nicht vorhanden sein');
  assert(!('pin' in mitglieder[1]), 'pin darf nicht vorhanden sein');
});

await test('enthält keine mustChangePIN-Felder', () => {
  const { mitglieder } = parseMitglieder(TEXT_ZWEI);
  assert(!('mustChangePIN' in mitglieder[0]));
});

suite('parseMitglieder — Sonderzeichen');

await test('Umlaute im Namen werden korrekt übernommen', () => {
  const { mitglieder } = parseMitglieder(TEXT_UMLAUTE);
  assertEqual(mitglieder[0].name, 'Amelie Pfüller');
});

suite('parseMitglieder — Fehlerfall');

await test('leerer Text → 0 Mitglieder, kein Absturz', () => {
  const { mitglieder } = parseMitglieder(TEXT_LEER);
  assertEqual(mitglieder.length, 0);
});

await test('ungültiger Text → 0 Mitglieder', () => {
  const { mitglieder } = parseMitglieder(TEXT_KEIN_MATCH);
  assertEqual(mitglieder.length, 0);
});

/* ── Render ─────────────────────────────────────────────────── */
const out = document.getElementById('output');
let html = '', lastSuite = '';
results.forEach(r => {
  if (r.suite !== lastSuite) {
    if (lastSuite) html += '</div>';
    html += `<div class="suite"><div class="suite-title">${r.suite}</div>`;
    lastSuite = r.suite;
  }
  const icon = r.ok ? '✓' : '✗';
  const cls  = r.ok ? 'pass' : 'fail';
  html += `<div class="result ${cls}">${icon} ${r.name}${r.ok ? '' : '<br><span style="color:#f99;margin-left:1.5em">'+r.err+'</span>'}</div>`;
});
if (lastSuite) html += '</div>';
out.innerHTML = html;
const total = results.length, passed = results.filter(r=>r.ok).length, failed = total-passed;
const sumEl = document.getElementById('summary');
sumEl.textContent = `${passed}/${total} bestanden${failed ? ' — '+failed+' fehlgeschlagen' : ''}`;
sumEl.className = failed ? 'has-fail' : 'all-pass';
</script>
</body>
</html>
