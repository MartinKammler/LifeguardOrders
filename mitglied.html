<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitgliederbereich – LifeguardOrders</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <nav>
    <a href="mitglied.html" class="nav-brand">LifeguardOrders</a>
  </nav>

  <main class="container stack gap-16" style="padding-top:20px">
    <section class="card">
      <h1 style="margin-bottom:8px">Mitgliederbereich</h1>
      <p class="text-sm" style="color:var(--text-2);margin-bottom:20px">
        Dein persönlicher Bereich bei LifeguardOrders.
      </p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <a href="wuensche.html" style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:background .15s" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='var(--surface2)'">
          <div>
            <div style="font-weight:600;margin-bottom:3px">Meine Wünsche</div>
            <div class="text-sm" style="color:var(--text-2)">Wünsche für die nächste Sammelbestellung eintragen, einsehen und stornieren.</div>
          </div>
        </a>
      </div>
    </section>

    <section class="card" id="mitglied-status-card">
      <h2>Aktueller Zugriff</h2>
      <div id="mitglied-status"></div>
    </section>

    <section class="card" id="mitglied-sperre-card" style="display:none">
      <h2>Sperrhinweis</h2>
      <div id="mitglied-sperre"></div>
    </section>
  </main>

  <script type="module" src="src/auth-guard.js"></script>
  <script type="module" src="src/mitglied-app.js"></script>
</body>
</html>
