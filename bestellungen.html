<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestellungen – LifeguardOrders</title>
  <link rel="stylesheet" href="src/style.css">
  <script type="module" src="src/auth-guard.js"></script>
  <style>
    .meta { font-size:.78rem; color:var(--text-2); }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="index.html">LifeguardOrders</a>
  <a href="bestellungen.html" class="active">Bestellungen</a>
  <a href="materialbestand.html">Materialbestand</a>
  <a href="rechnungen.html">Rechnungen</a>
  <a href="kassenwart.html">Kassenwart</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="einstellungen.html">Einstellungen</a>
</nav>

<div class="container">
  <div id="sync-status-banner" class="hinweis hinweis-warn" style="display:none"></div>
  <div class="flex gap-8" style="align-items:center;margin-bottom:20px">
    <h1 style="margin:0;flex:1">Bestellungen</h1>
    <a class="btn btn-primary btn-sm" href="bestellung-sammeln.html">+ Neue Bestellung</a>
  </div>

  <div class="card" id="liste-card">
    <div id="liste-inhalt">
      <div class="leer-hinweis" style="text-align:center;padding:48px 24px;color:var(--text-2)">
        <p style="margin-bottom:12px">Noch keine Bestellungen angelegt.</p>
        <a class="btn btn-ghost" href="bestellung-sammeln.html">Neue Bestellung anlegen</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { load }               from './src/storage.js';
import { createWebDavClient } from './src/webdav.js';
import { html, raw, setHTML } from './src/dom.js';
import { getSession }         from './src/session.js';
import { darfAktion }         from './src/authz.js';
import { confirmDialog, renderSyncBanner, toast } from './src/ui-feedback.js';
import {
  getScopeSyncStatus,
  getSyncState,
  hydrateJsonFromSync,
  persistJsonWithSync,
  syncHinweisText,
} from './src/sync.js';

const STORAGE_KEY_E = 'lo_einstellungen';
const STORAGE_KEY_B = 'lo_bestellungen';
const NC_PFAD_B     = '/LifeguardOrders/bestellungen.json';
const SYNC_SCOPE_B  = 'bestellungen';

let bestellungen = [];
let client = null;

function darfBestellungSchreiben() {
  return darfAktion('bestellung-schreiben', getSession());
}

function eur(v) { return Number(v).toFixed(2).replace('.', ',') + ' €'; }

function updateSyncBanner() {
  const status = getScopeSyncStatus(getSyncState(), SYNC_SCOPE_B);
  renderSyncBanner({
    target: document.getElementById('sync-status-banner'),
    status,
    label: 'Bestellungen',
    onReload: () => window.location.reload(),
    exportData: () => bestellungen,
    exportFilename: 'bestellungen-konfliktkopie.json',
  });
}

function summePositionen(positionen) {
  return positionen
    .filter(p => p.typ === 'artikel')
    .reduce((s, p) => s + p.einzelpreis * p.menge, 0);
}

function sondermengenInfo(bestellung) {
  const artikelPositionen = (bestellung.positionen || []).filter(p => p.typ === 'artikel');
  const retoure = artikelPositionen.reduce((summe, p) => summe + (p.retoureMenge || 0), 0);
  const ogBestand = artikelPositionen.reduce((summe, p) => summe + (p.ogBestandMenge || 0), 0);

  if (!retoure && !ogBestand) {
    return '';
  }

  const teile = [];
  if (retoure) teile.push(`Retoure ${retoure}`);
  if (ogBestand) teile.push(`Lagerbestand ${ogBestand}`);
  return teile.join(' · ');
}

function statusBadge(status) {
  switch (status) {
    case 'sammlung':      return raw('<span class="badge badge-amber">Sammlung</span>');
    case 'bestellt':      return raw('<span class="badge badge-blue">Bestellt</span>');
    case 'anprobe':       return raw('<span class="badge badge-amber">Anprobe</span>');
    case 'abgeschlossen': return raw('<span class="badge badge-green">Abgeschlossen</span>');
    default:              return raw('<span class="badge badge-amber">Sammlung</span>');
  }
}


function mengenInfo(b) {
  if (b.status === 'abgeschlossen' || b.status === 'anprobe') {
    const artikel = (b.positionen || []).filter(p => p.typ === 'artikel');
    return raw(html`<span style="color:var(--green)">${artikel.length}</span>
            <span class="meta"> Position${artikel.length !== 1 ? 'en' : ''}</span>`);
  }
  // sammlung oder bestellt: Anzahl Wünsche
  const anzahl = (b.wuensche || []).length;
  return raw(html`<span style="color:var(--amber)">${anzahl}</span>
          <span class="meta"> Wunsch${anzahl !== 1 ? 'e' : ''}</span>`);
}

function aktionenHtml(b) {
  const darfSchreiben = darfBestellungSchreiben();
  if (!darfSchreiben) {
    return raw('<span class="meta">Nur Ansicht</span>');
  }
  switch (b.status) {
    case 'sammlung':
      return raw(html`<a class="btn btn-ghost btn-sm" href="bestellung-sammeln.html?id=${encodeURIComponent(b.id)}">Bearbeiten</a>`);
    case 'bestellt':
      return raw(html`<a class="btn btn-ghost btn-sm" href="bestellung-sammeln.html?id=${encodeURIComponent(b.id)}">Bearbeiten</a>
              <a class="btn btn-primary btn-sm" href="bestellung-abgleich.html?id=${encodeURIComponent(b.id)}">Abgleich</a>`);
    case 'anprobe':
      return raw(html`<a class="btn btn-primary btn-sm" href="bestellung-abgleich.html?id=${encodeURIComponent(b.id)}">Anprobe</a>`);
    case 'abgeschlossen':
      return raw(html`<a class="btn btn-ghost btn-sm" href="bestellung-abgleich.html?id=${encodeURIComponent(b.id)}">Ansehen</a>
              <button class="btn btn-ghost btn-sm" data-aktion="wieder-oeffnen" data-id="${b.id}">Wieder öffnen</button>`);
    default:
      return raw(html`<a class="btn btn-ghost btn-sm" href="bestellung-sammeln.html?id=${encodeURIComponent(b.id)}">Bearbeiten</a>`);
  }
}

window.oeffneWieder = async function(id) {
  if (!darfBestellungSchreiben()) {
    toast('Du darfst Bestellungen nicht wieder öffnen.', 'error');
    return;
  }
  const bestaetigt = await confirmDialog({
    title: 'Bestellung wieder öffnen?',
    body: 'Positionen und Rechnungen werden gelöscht. Wünsche bleiben erhalten.\nDer Abgleich kann danach erneut durchgeführt werden.',
    confirmText: 'Wieder öffnen',
    confirmTone: 'primary',
  });
  if (!bestaetigt) return;
  const idx = bestellungen.findIndex(b => b.id === id);
  if (idx < 0) return;
  const vorher = JSON.parse(JSON.stringify(bestellungen));
  bestellungen[idx] = { ...bestellungen[idx], status: 'bestellt', positionen: [], rechnungen: [] };
  const gespeichert = await persistJsonWithSync({
    scope: SYNC_SCOPE_B,
    storageKey: STORAGE_KEY_B,
    data: bestellungen,
    client,
    remotePath: NC_PFAD_B,
  });
  if (!gespeichert.ok) {
    bestellungen = vorher;
    updateSyncBanner();
    toast(syncHinweisText(gespeichert.sync, 'Bestellungen'), 'error');
    render();
    return;
  }
  updateSyncBanner();
  toast('Bestellung wieder geöffnet.', 'success');
  render();
};

function render() {
  const el = document.getElementById('liste-inhalt');
  if (!bestellungen.length) {
    setHTML(el, `
      <div style="text-align:center;padding:48px 24px;color:var(--text-2)">
        <p style="margin-bottom:12px">Noch keine Bestellungen angelegt.</p>
        <a class="btn btn-ghost" href="bestellung-sammeln.html">Neue Bestellung anlegen</a>
      </div>`);
    return;
  }

  const sorted = [...bestellungen].sort((a, b) => b.datum.localeCompare(a.datum));

  setHTML(el, html`
    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Bezeichnung</th>
          <th>Phase</th>
          <th style="text-align:right">Umfang</th>
          <th style="text-align:right">Betrag</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(b => {
          const summe = summePositionen(b.positionen || []);
          const sondermengen = sondermengenInfo(b);
          return html`
          <tr>
            <td class="meta">${b.datum}</td>
            <td>
              <strong>${b.bezeichnung}</strong>
              ${sondermengen ? html`<div class="meta" style="margin-top:4px">${sondermengen}</div>` : ''}
            </td>
            <td>${statusBadge(b.status)}</td>
            <td style="text-align:right">${mengenInfo(b)}</td>
            <td style="text-align:right">${summe > 0 ? eur(summe) : raw('<span class="meta">–</span>')}</td>
            <td style="text-align:right">
              ${aktionenHtml(b)}
            </td>
          </tr>`;
        })}
      </tbody>
    </table>`);

  el.querySelectorAll('[data-aktion="wieder-oeffnen"]').forEach(btn => {
    btn.addEventListener('click', () => oeffneWieder(btn.dataset.id));
  });
}

async function init() {
  const e = load(STORAGE_KEY_E);
  const ncPass = e?.nc?.pass || sessionStorage.getItem('lo_nc_pass') || '';
  if (e?.nc?.url && e?.nc?.user && ncPass) {
    client = createWebDavClient({ ...e.nc, pass: ncPass });
  }

  const lokal = load(STORAGE_KEY_B);
  if (lokal) bestellungen = lokal;

  if (client) {
    setHTML(document.getElementById('liste-inhalt'), '<p class="meta" style="padding:24px 0">Synchronisiere mit Nextcloud …</p>');
    const r = await hydrateJsonFromSync({
      scope: SYNC_SCOPE_B,
      storageKey: STORAGE_KEY_B,
      client,
      remotePath: NC_PFAD_B,
      isValidRemote: data => Array.isArray(data),
    });
    if (Array.isArray(r.data)) {
      bestellungen = r.data;
    }
  }

  render();
  updateSyncBanner();

  document.querySelectorAll('a[href="bestellung-sammeln.html"]').forEach(link => {
    if (!darfBestellungSchreiben()) {
      link.style.display = 'none';
    }
  });

  if (new URLSearchParams(location.search).get('saved')) {
    toast('Wünsche gespeichert.', 'success', 3000);
    history.replaceState(null, '', location.pathname);
  }
}

init();
</script>
</body>
</html>
